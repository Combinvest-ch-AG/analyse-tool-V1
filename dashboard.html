<!doctype html><html lang="de-CH"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="advisor.css"><title>combinvest – Berater Dashboard</title></head>
<body><div class="app-shell"><aside class="sidebar"><a class="brand" href="dashboard.html"><span class="brand-mark">C</span><span>comb<em>invest</em></span></a><nav class="side-nav"><a class="active" href="dashboard.html">Übersicht</a><a href="#analysen">Analysen</a><a href="#kunden">Kunden</a><a href="#termine">Termine</a></nav><div class="advisor-card"><strong id="advisorName"></strong><small id="advisorRole"></small><button class="logout" id="logout">Abmelden</button></div></aside>
<main class="main"><header class="topbar"><div><h1>Guten Tag, <span id="firstName"></span></h1><p>Hier sehen Sie Ihre Kunden, Termine und laufenden Analysen.</p></div><button class="btn btn-primary" id="newAnalysis">＋ Neue Analyse</button></header>
<section class="stats"><article class="stat"><small>Offene Analysen</small><strong id="openCount">0</strong></article><article class="stat"><small>Abgeschlossen</small><strong id="doneCount">0</strong></article><article class="stat"><small>Kunden</small><strong id="customerCount">0</strong></article><article class="stat"><small>Kommende Termine</small><strong id="appointmentCount">0</strong></article></section>
<div class="grid"><section class="card" id="analysen"><div class="card-head"><h2>Letzte Analysen</h2><button class="btn btn-secondary" id="newAnalysis2">Neue Analyse</button></div><div class="list" id="analysisList"></div></section><section class="card" id="termine"><div class="card-head"><h2>Nächste Termine</h2></div><div class="list" id="appointmentList"></div></section><section class="card" id="kunden" style="grid-column:1/-1"><div class="card-head"><h2>Meine Kunden</h2><button class="btn btn-secondary" id="newCustomer">Kunde erfassen</button></div><div class="list" id="customerList"></div></section></div></main></div>
<div class="modal" id="customerModal" hidden><form class="modal-card" id="customerForm"><h2>Neuen Kunden erfassen</h2><div class="form-grid"><div class="field"><label>Vorname</label><input name="firstName" required></div><div class="field"><label>Nachname</label><input name="lastName" required></div><div class="field"><label>Geburtsdatum</label><input name="birthdate" type="date"></div><div class="field"><label>Telefon</label><input name="phone"></div><div class="field full"><label>E-Mail</label><input name="email" type="email"></div><div class="field"><label>PLZ</label><input name="postcode"></div><div class="field"><label>Ort</label><input name="city"></div></div><div class="modal-actions"><button type="button" class="btn btn-secondary" id="cancelModal">Abbrechen</button><button class="btn btn-primary">Speichern & Analyse starten</button></div></form></div>
<script src="advisors-data.js"></script><script src="advisor-store.js"></script><script>
(function(){"use strict";if(!CombinvestAdvisor.requireAuth())return;var advisor=CombinvestAdvisor.currentAdvisor();
function esc(v){return String(v||"").replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function initials(c){return esc((c.firstName[0]||"")+(c.lastName[0]||""));}
function openAnalysis(customerId,step,analysisId){location.href="analyse.html?customerId="+encodeURIComponent(customerId)+"&analysisId="+encodeURIComponent(analysisId)+"&step="+(step||1);}
function render(){var customers=CombinvestAdvisor.customers(),analyses=CombinvestAdvisor.analyses(),appointments=CombinvestAdvisor.appointments(),byId={};customers.forEach(function(c){byId[c.id]=c;});
advisorName.textContent=advisor.firstName+" "+advisor.lastName;advisorRole.textContent=advisor.role;firstName.textContent=advisor.firstName;openCount.textContent=analyses.filter(function(a){return a.status==="offen";}).length;doneCount.textContent=analyses.filter(function(a){return a.status==="abgeschlossen";}).length;customerCount.textContent=customers.length;appointmentCount.textContent=appointments.filter(function(a){return new Date(a.startsAt)>new Date();}).length;
analysisList.innerHTML=analyses.length?analyses.sort(function(a,b){return b.updatedAt.localeCompare(a.updatedAt);}).slice(0,6).map(function(a){var c=byId[a.customerId]||{firstName:"Unbekannt",lastName:""};return'<a class="list-row" href="analyse.html?customerId='+encodeURIComponent(a.customerId)+'&analysisId='+encodeURIComponent(a.id)+'&step='+(a.step||1)+'"><span class="avatar">'+initials(c)+'</span><span class="row-main"><strong>'+esc(c.firstName+" "+c.lastName)+'</strong><small>Schritt '+(a.step||1)+' · '+(a.progress||0)+' % · '+new Date(a.updatedAt).toLocaleDateString("de-CH")+'</small></span><span class="badge '+(a.status==="abgeschlossen"?"done":"")+'">'+(a.status==="abgeschlossen"?"Abgeschlossen":"Offen")+'</span></a>';}).join(""):'<div class="empty">Noch keine Analyse vorhanden.</div>';
appointmentList.innerHTML=appointments.length?appointments.slice(0,5).map(function(a){var c=byId[a.customerId]||{};return'<div class="list-row"><span class="avatar">'+initials(c)+'</span><span class="row-main"><strong>'+esc(a.title)+'</strong><small>'+esc((c.firstName||"")+" "+(c.lastName||""))+' · '+new Date(a.startsAt).toLocaleString("de-CH",{dateStyle:"medium",timeStyle:"short"})+'</small></span></div>';}).join(""):'<div class="empty">Keine Termine geplant.</div>';
customerList.innerHTML=customers.map(function(c){var existing=CombinvestAdvisor.analysisForCustomer(c.id)[0];return'<a class="list-row" href="kunde.html?customerId='+encodeURIComponent(c.id)+'"><span class="avatar">'+initials(c)+'</span><span class="row-main"><strong>'+esc(c.firstName+" "+c.lastName)+'</strong><small>'+esc([c.email,c.phone,[c.postcode,c.city].filter(Boolean).join(" ")].filter(Boolean).join(" · "))+'</small></span><span class="link">'+(existing?"Kundenprofil öffnen →":"Analyse vorbereiten →")+'</span></a>';}).join("");
}
function showModal(){customerModal.hidden=false;customerForm.elements.firstName.focus();}newAnalysis.onclick=newAnalysis2.onclick=newCustomer.onclick=showModal;cancelModal.onclick=function(){customerModal.hidden=true;};customerModal.addEventListener("click",function(e){if(e.target===this)this.hidden=true;});customerForm.addEventListener("submit",function(e){e.preventDefault();var c=CombinvestAdvisor.saveCustomer(Object.fromEntries(new FormData(this))),analysis=CombinvestAdvisor.startAnalysis(c.id);openAnalysis(c.id,1,analysis.id);});logout.onclick=function(){CombinvestAdvisor.logout();location.href="login.html";};render();
})();</script></body></html>
