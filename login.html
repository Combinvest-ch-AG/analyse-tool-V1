<!doctype html><html lang="de-CH"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet"><title>combinvest – Berater Login</title>
<style>:root{--blue:#4285f4;--ink:#101a33;--muted:#687386;--line:#e3e9f1}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:22px;font-family:Manrope,sans-serif;color:var(--ink);background:radial-gradient(circle at 80% 10%,#dceaff,transparent 34%),#f5f7fb}.login{width:min(430px,100%);background:#fff;border:1px solid var(--line);border-radius:22px;padding:34px;box-shadow:0 26px 70px rgba(31,55,94,.13)}.brand{font-size:27px;font-weight:900;line-height:.8}.brand span{display:block;color:var(--blue)}h1{font-size:25px;margin:34px 0 7px}p{color:var(--muted);font-size:14px}.field{display:grid;gap:7px;margin-top:17px}.field label{font-size:12px;font-weight:800}.field input{font:inherit;border:1px solid var(--line);border-radius:11px;padding:13px}.field input:focus{outline:2px solid #b9d3ff;border-color:var(--blue)}button{width:100%;margin-top:22px;padding:13px;border:0;border-radius:11px;background:var(--blue);color:#fff;font:800 14px Manrope;cursor:pointer}.demo{margin-top:18px;padding:13px;border-radius:11px;background:#f1f6ff;font-size:12px;color:#496078}.error{color:#c02d2d;font-size:13px;min-height:19px}</style></head>
<body><main class="login"><div class="brand">comb<span>invest</span></div><h1>Berater-Portal</h1><p>Melden Sie sich an, um Kunden, Termine und Analysen zu verwalten.</p><form id="loginForm"><div class="field"><label for="email">E-Mail-Adresse</label><input id="email" type="email" autocomplete="username" required value="alper.ermis@combinvest.swiss"></div><div class="field"><label for="password">Passwort</label><input id="password" type="password" autocomplete="current-password" required value="Combinvest2026!"></div><button>Anmelden</button><p class="error" id="error"></p></form><div class="demo"><b>Frontend-Demo</b><br>Alle hinterlegten Combinvest-E-Mail-Adressen<br>Passwort: Combinvest2026!<br><br>Die echte Authentifizierung wird später durch Supabase Auth ersetzt.</div></main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase-config.js"></script><script src="supabase-auth.js"></script><script src="advisors-data.js"></script><script src="advisor-store.js"></script><script>
(async function(){
  var existing=await CombinvestCloud.current();
  if(existing){CombinvestAdvisor.login(existing.profile.email,"Combinvest2026!");location.href="dashboard.html";return;}
  document.getElementById("loginForm").addEventListener("submit",async function(e){
    e.preventDefault();var button=this.querySelector("button");error.textContent="";button.disabled=true;button.textContent="Anmeldung wird geprüft …";
    try{
      var result=await CombinvestCloud.signIn(email.value,password.value);
      var local=CombinvestAdvisor.login(result.profile.email,"Combinvest2026!");
      if(!local)throw new Error("Das Beraterprofil ist lokal noch nicht hinterlegt.");
      var p=new URLSearchParams(location.search).get("returnTo");
      location.href=p&&/^[a-z0-9?&=._-]+$/i.test(p)?p:"dashboard.html";
    }catch(ex){error.textContent=ex.message==="Invalid login credentials"?"E-Mail-Adresse oder Passwort ist nicht korrekt.":ex.message;button.disabled=false;button.textContent="Anmelden";}
  });
})();
</script></body></html>
