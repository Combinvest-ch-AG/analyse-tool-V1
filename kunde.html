<!doctype html><html lang="de-CH"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="advisor.css"><title>combinvest – Kundenprofil</title>
<style>.profile-head{display:flex;align-items:center;gap:18px}.profile-head .avatar{width:62px;height:62px;font-size:20px}.details{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.detail{background:var(--page);border-radius:11px;padding:13px}.detail small,.detail strong{display:block}.detail small{color:var(--muted);margin-bottom:5px}.history{margin-top:20px}@media(max-width:650px){.details{grid-template-columns:1fr}}</style></head>
<body><div class="app-shell"><aside class="sidebar"><a class="brand" href="dashboard.html"><span class="brand-mark">C</span><span>comb<em>invest</em></span></a><nav class="side-nav"><a href="dashboard.html">← Übersicht</a><a class="active" href="#">Kundenprofil</a></nav><div class="advisor-card"><strong id="advisorName"></strong><small>Kundenberater</small></div></aside>
<main class="main"><header class="topbar"><div class="profile-head"><span class="avatar" id="avatar"></span><div><h1 id="customerName"></h1><p>Gespeicherte Kundendaten und Beratungsverlauf</p></div></div><button class="btn btn-primary" id="startNew">＋ Neue Analyse</button></header><section class="card"><div class="card-head"><h2>Basisdaten</h2></div><div class="details" id="details"></div></section><section class="card history"><div class="card-head"><h2>Analysen</h2></div><div class="list" id="history"></div></section></main></div>
<script src="advisor-store.js"></script><script>(function(){if(!CombinvestAdvisor.requireAuth())return;var id=new URLSearchParams(location.search).get("customerId"),c=CombinvestAdvisor.customer(id),a=CombinvestAdvisor.currentAdvisor();if(!c){location.href="dashboard.html";return;}function esc(v){return String(v||"—").replace(/[&<>"]/g,function(x){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[x];});}advisorName.textContent=a.firstName+" "+a.lastName;customerName.textContent=c.firstName+" "+c.lastName;avatar.textContent=(c.firstName[0]||"")+(c.lastName[0]||"");details.innerHTML=[["Geburtsdatum",c.birthdate?new Date(c.birthdate).toLocaleDateString("de-CH"):"—"],["E-Mail",c.email],["Telefon",c.phone],["Adresse",[c.postcode,c.city].filter(Boolean).join(" ")],["Kunden-ID",c.id]].map(function(x){return'<div class="detail"><small>'+esc(x[0])+'</small><strong>'+esc(x[1])+'</strong></div>';}).join("");var items=CombinvestAdvisor.analysisForCustomer(c.id);history.innerHTML=items.length?items.map(function(x){return'<a class="list-row" href="analyse.html?customerId='+encodeURIComponent(c.id)+'&analysisId='+encodeURIComponent(x.id)+'&step='+(x.step||1)+'"><span class="avatar">'+(x.status==="abgeschlossen"?"✓":"…")+'</span><span class="row-main"><strong>'+(x.status==="abgeschlossen"?"Abgeschlossene Analyse":"Offene Analyse")+'</strong><small>'+new Date(x.updatedAt).toLocaleString("de-CH")+' · Schritt '+(x.step||1)+' · '+(x.progress||0)+' %</small></span><span class="badge '+(x.status==="abgeschlossen"?"done":"")+'">'+(x.status==="abgeschlossen"?"Ansehen":"Fortsetzen")+'</span></a>';}).join(""):'<div class="empty">Für diesen Kunden wurde noch keine Analyse gestartet.</div>';startNew.onclick=function(){var record=CombinvestAdvisor.startAnalysis(c.id);location.href="analyse.html?customerId="+encodeURIComponent(c.id)+"&analysisId="+encodeURIComponent(record.id)+"&step=1";};})();</script></body></html>
