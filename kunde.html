<!doctype html><html lang="de-CH"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="advisor.css"><title>combinvest – Kundenprofil</title>
<style>.profile-head{display:flex;align-items:center;gap:18px}.profile-head .avatar{width:62px;height:62px;font-size:20px}.details{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.detail{background:var(--page);border-radius:11px;padding:13px}.detail small,.detail strong{display:block}.detail small{color:var(--muted);margin-bottom:5px}.history{margin-top:20px}@media(max-width:650px){.details{grid-template-columns:1fr}}</style></head>
<body><div class="app-shell"><aside class="sidebar"><a class="brand" href="dashboard.html"><span class="brand-mark">C</span><span>comb<em>invest</em></span></a><nav class="side-nav"><a href="dashboard.html">← Übersicht</a><a class="active" href="#">Kundenprofil</a></nav><div class="advisor-card"><strong id="advisorName"></strong><small id="advisorRole"></small></div></aside>
<main class="main"><header class="topbar"><div class="profile-head"><span class="avatar" id="avatar"></span><div><h1 id="customerName">Kunde wird geladen …</h1><p>Gespeicherte Kundendaten und Beratungsverlauf</p></div></div><button class="btn btn-primary" id="startNew">＋ Neue Analyse</button></header><section class="card"><div class="card-head"><h2>Basisdaten</h2></div><div class="details" id="details"></div></section><section class="card history"><div class="card-head"><h2>Analysen</h2></div><div class="list" id="history"><div class="empty">Supabase wird geladen …</div></div></section></main></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase-config.js"></script><script src="supabase-auth.js"></script><script src="supabase-data.js"></script><script>
(async function(){"use strict";var customerId=new URLSearchParams(location.search).get("customerId"),history=document.getElementById("history");
function esc(v){return String(v||"—").replace(/[&<>"]/g,function(x){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[x];});}
try{
  var auth=await CombinvestCloud.current();if(!auth){location.href="login.html";return;}
  var data=await CombinvestData.customer(customerId),c=data.customer,items=data.analyses;
  advisorName.textContent=auth.profile.display_name;advisorRole.textContent=auth.profile.job_title||auth.profile.role;
  customerName.textContent=(c.first_name||"")+" "+(c.last_name||"");avatar.textContent=((c.first_name||"")[0]||"")+((c.last_name||"")[0]||"");
  details.innerHTML=[["Geburtsdatum",c.birthdate?new Date(c.birthdate).toLocaleDateString("de-CH"):"—"],["E-Mail",c.email],["Telefon",c.phone],["Adresse",[c.postcode,c.city].filter(Boolean).join(" ")],["Kunden-ID",c.id],["Verträge",String(data.contracts.length)]].map(function(x){return'<div class="detail"><small>'+esc(x[0])+'</small><strong>'+esc(x[1])+'</strong></div>';}).join("");
  history.innerHTML=items.length?items.map(function(x){return'<a class="list-row" href="analyse.html?customerId='+encodeURIComponent(c.id)+'&analysisId='+encodeURIComponent(x.id)+'&step='+(x.current_step||1)+'"><span class="avatar">'+(x.status==="completed"?"✓":"…")+'</span><span class="row-main"><strong>'+(x.status==="completed"?"Abgeschlossene Analyse":"Offene Analyse")+'</strong><small>'+new Date(x.updated_at).toLocaleString("de-CH")+' · Schritt '+(x.current_step||1)+' · '+Number(x.progress_percent||0).toFixed(0)+' %</small></span><span class="badge '+(x.status==="completed"?"done":"")+'">'+(x.status==="completed"?"Ansehen":"Fortsetzen")+'</span></a>';}).join(""):'<div class="empty">Für diesen Kunden wurde noch keine Analyse gestartet.</div>';
  startNew.onclick=async function(){this.disabled=true;try{var analysisId=await CombinvestData.startAnalysis(c.id);location.href="analyse.html?customerId="+encodeURIComponent(c.id)+"&analysisId="+encodeURIComponent(analysisId)+"&step=1";}catch(error){alert("Analyse konnte nicht gestartet werden: "+error.message);this.disabled=false;}};
}catch(error){history.innerHTML='<div class="empty">Kundenprofil konnte nicht geladen werden: '+esc(error.message)+'</div>';}
})();</script></body></html>
